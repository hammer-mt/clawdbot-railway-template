[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Require a persistent volume mounted at /data (Railway).
requiredMountPath = "/data"

[variables]
# Explicitly set PORT to 8080 to avoid domain routing mismatches.
# Railway's domain targetPort must also be set to 8080 (done via GraphQL API during setup).
PORT = "8080"
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"
